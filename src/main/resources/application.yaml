server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: credit-application-service
  web:
    locale: en
    locale-resolver: FIXED
  output.ansi.enabled: ALWAYS
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

resilience4j:
  circuitbreaker:
    instances:
      frankfurter:
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

  retry:
    instances:
      frankfurter:
        maxAttempts: 3
        waitDuration: 200ms

exchange:
  frankfurter:
    url: ${EXTERNAL_FRANKFURTER_URL}
    connect-timeout: 500
    read-timeout: 700

logging:
  level:
    org:
      flywaydb: DEBUG